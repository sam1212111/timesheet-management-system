name: Build and Push Remaining Services

on:
  push:
    branches: [ main ]
    paths:
      - 'auth-service/**'
      - 'admin-service/**'
      - 'leave-service/**'
      - 'timesheet-service/**'
      - 'api-gateway/**'
      - 'common/**'
      - '.github/workflows/build-and-push-services.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    name: Build and Push ${{ matrix.service.image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - path: auth-service
            image: auth-service
          - path: admin-service
            image: admin-service
          - path: leave-service
            image: leave-service
          - path: timesheet-service
            image: timesheet-service
          - path: api-gateway
            image: api-gateway

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Java 21
        uses: actions/setup-java@v5 
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and install common module
        run: mvn -f common/pom.xml clean install -DskipTests

      - name: Build service jar
        run: mvn -f ${{ matrix.service.path }}/pom.xml clean package -DskipTests

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service.path }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service.image }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service.image }}:${{ github.sha }}
