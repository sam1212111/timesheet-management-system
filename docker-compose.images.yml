services:
  auth-service:
    image: ${DOCKERHUB_USERNAME}/auth-service:${AUTH_IMAGE_TAG:-latest}
    container_name: auth-service
    environment:
      CONFIG_SERVER_HOST: ${CONFIG_SERVER_HOST}
      CONFIG_SERVER_PORT: ${CONFIG_SERVER_PORT}
      CONFIG_SERVER_USERNAME: ${CONFIG_SERVER_USERNAME}
      CONFIG_SERVER_PASSWORD_ENCODED: ${CONFIG_SERVER_PASSWORD_ENCODED}
      EUREKA_URL: ${EUREKA_URL}
      APP_JWT_SECRET: ${APP_JWT_SECRET}
      APP_JWT_EXPIRATION_MS: ${APP_JWT_EXPIRATION_MS}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - tms-net

  timesheet-service:
    image: ${DOCKERHUB_USERNAME}/timesheet-service:${TIMESHEET_IMAGE_TAG:-latest}
    container_name: timesheet-service
    environment:
      CONFIG_SERVER_HOST: ${CONFIG_SERVER_HOST}
      CONFIG_SERVER_PORT: ${CONFIG_SERVER_PORT}
      CONFIG_SERVER_USERNAME: ${CONFIG_SERVER_USERNAME}
      CONFIG_SERVER_PASSWORD_ENCODED: ${CONFIG_SERVER_PASSWORD_ENCODED}
      EUREKA_URL: ${EUREKA_URL}
      APP_JWT_SECRET: ${APP_JWT_SECRET}
      APP_JWT_EXPIRATION_MS: ${APP_JWT_EXPIRATION_MS}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - tms-net

  leave-service:
    image: ${DOCKERHUB_USERNAME}/leave-service:${LEAVE_IMAGE_TAG:-latest}
    container_name: leave-service
    environment:
      CONFIG_SERVER_HOST: ${CONFIG_SERVER_HOST}
      CONFIG_SERVER_PORT: ${CONFIG_SERVER_PORT}
      CONFIG_SERVER_USERNAME: ${CONFIG_SERVER_USERNAME}
      CONFIG_SERVER_PASSWORD_ENCODED: ${CONFIG_SERVER_PASSWORD_ENCODED}
      EUREKA_URL: ${EUREKA_URL}
      APP_JWT_SECRET: ${APP_JWT_SECRET}
      APP_JWT_EXPIRATION_MS: ${APP_JWT_EXPIRATION_MS}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - tms-net

  admin-service:
    image: ${DOCKERHUB_USERNAME}/admin-service:${ADMIN_IMAGE_TAG:-latest}
    container_name: admin-service
    environment:
      CONFIG_SERVER_HOST: ${CONFIG_SERVER_HOST}
      CONFIG_SERVER_PORT: ${CONFIG_SERVER_PORT}
      CONFIG_SERVER_USERNAME: ${CONFIG_SERVER_USERNAME}
      CONFIG_SERVER_PASSWORD_ENCODED: ${CONFIG_SERVER_PASSWORD_ENCODED}
      EUREKA_URL: ${EUREKA_URL}
      APP_JWT_SECRET: ${APP_JWT_SECRET}
      APP_JWT_EXPIRATION_MS: ${APP_JWT_EXPIRATION_MS}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_FROM: ${MAIL_FROM}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - tms-net

  api-gateway:
    image: ${DOCKERHUB_USERNAME}/api-gateway:${GATEWAY_IMAGE_TAG:-latest}
    container_name: api-gateway
    depends_on:
      - auth-service
      - timesheet-service
      - leave-service
      - admin-service
    environment:
      CONFIG_SERVER_HOST: ${CONFIG_SERVER_HOST}
      CONFIG_SERVER_PORT: ${CONFIG_SERVER_PORT}
      CONFIG_SERVER_USERNAME: ${CONFIG_SERVER_USERNAME}
      CONFIG_SERVER_PASSWORD_ENCODED: ${CONFIG_SERVER_PASSWORD_ENCODED}
      EUREKA_URL: ${EUREKA_URL}
      APP_JWT_SECRET: ${APP_JWT_SECRET}
      APP_JWT_EXPIRATION_MS: ${APP_JWT_EXPIRATION_MS}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8080:8080"
    networks:
      - tms-net

networks:
  tms-net:  
    driver: bridge
