spring:
  application:
    name: timesheet-service
  config:
    import: optional:configserver:http://${app.config-server.username}:${app.config-server.password}@${app.config-server.host}:${app.config-server.port}
  rabbitmq:
    listener:
      simple:
        acknowledge-mode: auto
        default-requeue-rejected: false
        retry:
          enabled: false

server:
  forward-headers-strategy: framework
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=5m

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL}
  instance:
    prefer-ip-address: true

springdoc:
  api-docs:
    path: /api/v1/timesheets/api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  config-server:
    host: ${CONFIG_SERVER_HOST}
    port: ${CONFIG_SERVER_PORT}
    username: ${CONFIG_SERVER_USERNAME}
    password: ${CONFIG_SERVER_PASSWORD_ENCODED}
  jwt:
    secret: ${APP_JWT_SECRET}
    expiration-ms: ${APP_JWT_EXPIRATION_MS}

logging:
  level:
    com.tms.ts: DEBUG
