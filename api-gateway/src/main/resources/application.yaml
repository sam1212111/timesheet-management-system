spring:
  application:
    name: api-gateway
  config:
    import: optional:configserver:http://${app.config-server.username}:${app.config-server.password}@${app.config-server.host}:${app.config-server.port}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL}
  instance:
    prefer-ip-address: true

app:
  config-server:
    host: ${CONFIG_SERVER_HOST}
    port: ${CONFIG_SERVER_PORT}
    username: ${CONFIG_SERVER_USERNAME}
    password: ${CONFIG_SERVER_PASSWORD_ENCODED}
  jwt:
    secret: ${APP_JWT_SECRET}
    expiration-ms: ${APP_JWT_EXPIRATION_MS}

logging:
  level:
    com.tms.gateway: DEBUG
    org.springframework.cloud.gateway: DEBUG

management:
  endpoints:
      web:
        exposure:
          include: "*"
